services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: tonghua
      POSTGRES_USER: tonghua
      POSTGRES_DB: tonghua
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  coturn:
    image: coturn/coturn:4.6.2
    command: ["-n", "--log-file=stdout", "--lt-cred-mech", "--realm=tonghua.local"]
    ports:
      - "3478:3478"
      - "3478:3478/udp"
